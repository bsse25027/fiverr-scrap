<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fiverr Reviews Viewer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --line: #d9dde3;
      --text: #191b1f;
      --muted: #666d78;
      --green: #1dbf73;
      --blue: #3264d9;
      --warn: #a15c00;
      --shadow: 0 12px 34px rgba(29, 35, 48, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Segoe UI, Arial, sans-serif;
      line-height: 1.45;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(246, 247, 249, 0.94);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
    }

    .bar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      max-width: 1180px;
      margin: 0 auto;
      padding: 14px 18px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
    }

    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button,
    .file-label {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      height: 36px;
      padding: 0 12px;
      border-radius: 6px;
      font: inherit;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    button:hover,
    .file-label:hover {
      border-color: #aeb6c2;
    }

    button.primary {
      background: var(--green);
      color: white;
      border-color: var(--green);
    }

    button.danger {
      color: #b42318;
    }

    input[type="file"] {
      display: none;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      box-shadow: var(--shadow);
    }

    .stat .label {
      color: var(--muted);
      font-size: 12px;
    }

    .stat .value {
      font-size: 22px;
      font-weight: 800;
      margin-top: 4px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(200px, 1fr) auto;
      gap: 10px;
      margin-bottom: 14px;
      align-items: center;
    }

    .search {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 12px;
      font: inherit;
      width: 100%;
    }

    .filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .filters button.active {
      border-color: var(--blue);
      color: var(--blue);
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 12px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 12px;
    }

    .card.done {
      border-color: rgba(29, 191, 115, 0.6);
      background: #f3fff9;
    }

    .person {
      display: grid;
      grid-template-columns: 56px 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid var(--line);
      background: #eef1f5;
    }

    .name {
      font-weight: 800;
      word-break: break-word;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
      margin-top: 2px;
    }

    .review {
      color: #2a2e35;
      font-size: 14px;
      white-space: pre-wrap;
    }

    .empty {
      background: var(--panel);
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 32px;
      text-align: center;
      color: var(--muted);
    }

    .small {
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 760px) {
      .bar,
      .toolbar {
        grid-template-columns: 1fr;
      }

      .actions,
      .filters {
        justify-content: flex-start;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <h1>Fiverr Reviews Viewer</h1>
      <div class="actions">
        <label class="file-label">
          Load JSON
          <input id="fileInput" type="file" accept="application/json,.json">
        </label>
        <button id="exportState">Export Status</button>
        <button id="clearState" class="danger">Clear Status</button>
      </div>
    </div>
  </header>

  <main>
    <section class="stats">
      <div class="stat">
        <div class="label">Loaded</div>
        <div id="loadedCount" class="value">0</div>
      </div>
      <div class="stat">
        <div class="label">With Images</div>
        <div id="imageCount" class="value">0</div>
      </div>
      <div class="stat">
        <div class="label">Done</div>
        <div id="doneCount" class="value">0</div>
      </div>
      <div class="stat">
        <div class="label">Visible</div>
        <div id="visibleCount" class="value">0</div>
      </div>
    </section>

    <section class="toolbar">
      <input id="search" class="search" placeholder="Search username, country, or review text">
      <div class="filters">
        <button class="active" data-filter="all">All</button>
        <button data-filter="todo">Undone</button>
        <button data-filter="done">Done</button>
        <button data-filter="image">Image Only</button>
      </div>
    </section>

    <section id="grid" class="grid"></section>
    <div id="empty" class="empty">Load a Fiverr reviews JSON file to begin.</div>
  </main>

  <script>
    const STORAGE_KEY = "fiverrReviewViewer.doneUsernames.v1";
    const fileInput = document.getElementById("fileInput");
    const grid = document.getElementById("grid");
    const empty = document.getElementById("empty");
    const searchInput = document.getElementById("search");
    const loadedCount = document.getElementById("loadedCount");
    const imageCount = document.getElementById("imageCount");
    const doneCount = document.getElementById("doneCount");
    const visibleCount = document.getElementById("visibleCount");
    const clearState = document.getElementById("clearState");
    const exportState = document.getElementById("exportState");
    const filterButtons = [...document.querySelectorAll("[data-filter]")];

    let reviews = [];
    let filter = "all";
    let doneMap = loadDoneMap();

    function loadDoneMap() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      } catch {
        return {};
      }
    }

    function saveDoneMap() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(doneMap));
    }

    function keyFor(review) {
      return String(review.username || "").trim().toLowerCase();
    }

    function isDone(review) {
      return Boolean(doneMap[keyFor(review)]);
    }

    function setDone(review, value) {
      const key = keyFor(review);
      if (!key) return;
      if (value) {
        doneMap[key] = {
          username: review.username,
          updatedAt: new Date().toISOString()
        };
      } else {
        delete doneMap[key];
      }
      saveDoneMap();
      render();
    }

    function normalizeImageUrl(url) {
      if (!url) return null;
      return url
        .replace("/f_auto,q_auto,t_profile_small/", "/")
        .replace("/f_auto,q_auto,t_profile_original/", "/")
        .replace("/f_auto,q_auto/", "/")
        .replace(/([^:])\/{2,}/g, "$1/");
    }

    function normalizeReviews(data) {
      const list = Array.isArray(data) ? data : data.reviews || [];
      const byUsername = new Map();

      for (const item of list) {
        const username = String(item.username || "").trim();
        const profileImageUrl = normalizeImageUrl(item.profileImageUrl || item.profile_image_url || item.profileImage || null);
        if (!username || !profileImageUrl) continue;

        const existing = byUsername.get(username.toLowerCase());
        if (!existing) {
          byUsername.set(username.toLowerCase(), {
            username,
            profileImageUrl,
            country: item.country || item.reviewer_country || "",
            rating: item.rating ?? item.value ?? null,
            review: item.review || item.comment || "",
            sourceIndex: item.index || null
          });
        }
      }

      return [...byUsername.values()];
    }

    function filteredReviews() {
      const q = searchInput.value.trim().toLowerCase();
      return reviews.filter((review) => {
        if (filter === "done" && !isDone(review)) return false;
        if (filter === "todo" && isDone(review)) return false;
        if (filter === "image" && !review.profileImageUrl) return false;

        if (!q) return true;
        return [
          review.username,
          review.country,
          String(review.rating || ""),
          review.review
        ].join(" ").toLowerCase().includes(q);
      });
    }

    function updateStats(visible) {
      loadedCount.textContent = reviews.length;
      imageCount.textContent = reviews.filter((review) => review.profileImageUrl).length;
      doneCount.textContent = reviews.filter(isDone).length;
      visibleCount.textContent = visible.length;
    }

    function cardFor(review) {
      const card = document.createElement("article");
      card.className = `card${isDone(review) ? " done" : ""}`;

      const person = document.createElement("div");
      person.className = "person";

      const img = document.createElement("img");
      img.className = "avatar";
      img.src = review.profileImageUrl;
      img.alt = review.username;
      img.loading = "lazy";

      const info = document.createElement("div");
      const name = document.createElement("div");
      name.className = "name";
      name.textContent = review.username;
      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = [review.country, review.rating ? `${review.rating} stars` : ""].filter(Boolean).join(" | ");
      info.append(name, meta);

      const toggle = document.createElement("button");
      toggle.className = isDone(review) ? "primary" : "";
      toggle.textContent = isDone(review) ? "Done" : "Mark Done";
      toggle.addEventListener("click", () => setDone(review, !isDone(review)));

      person.append(img, info, toggle);

      const reviewText = document.createElement("div");
      reviewText.className = "review";
      reviewText.textContent = review.review || "";

      const imageUrl = document.createElement("div");
      imageUrl.className = "small";
      imageUrl.textContent = review.profileImageUrl;

      card.append(person, reviewText, imageUrl);
      return card;
    }

    function render() {
      const visible = filteredReviews();
      updateStats(visible);
      grid.textContent = "";
      empty.style.display = visible.length ? "none" : "block";
      empty.textContent = reviews.length ? "No reviews match the current filter." : "Load a Fiverr reviews JSON file to begin.";

      for (const review of visible) {
        grid.appendChild(cardFor(review));
      }
    }

    function downloadJson(filename, value) {
      const blob = new Blob([JSON.stringify(value, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    fileInput.addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      const text = await file.text();
      const data = JSON.parse(text);
      reviews = normalizeReviews(data);
      render();
    });

    searchInput.addEventListener("input", render);

    for (const button of filterButtons) {
      button.addEventListener("click", () => {
        filter = button.dataset.filter;
        filterButtons.forEach((item) => item.classList.toggle("active", item === button));
        render();
      });
    }

    clearState.addEventListener("click", () => {
      if (!confirm("Clear all saved done/undone username status?")) return;
      doneMap = {};
      saveDoneMap();
      render();
    });

    exportState.addEventListener("click", () => {
      downloadJson(`fiverr-review-status-${Date.now()}.json`, doneMap);
    });

    render();
  </script>
</body>
</html>
